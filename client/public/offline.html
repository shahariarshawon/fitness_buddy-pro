<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Fitness Buddy Pro Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #020617;
        color: white;
        padding: 24px;
      }

      .card {
        max-width: 420px;
        border: 1px solid #1e293b;
        background: #0f172a;
        border-radius: 24px;
        padding: 32px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.6;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Fitness Buddy Pro is currently offline. Some cached pages may still work, but
        syncing workout, meal, photo, and progress data requires internet.
      </p>
    </div>
  </body>
</html>
